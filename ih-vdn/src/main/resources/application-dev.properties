# Dev profile: run Flyway migrations automatically on startup.
quarkus.flyway.migrate-at-start=true
# Decision Control shares this database and creates its own tables in `public`
# (Hibernate ddl-auto), so the schema is non-empty before Flyway runs. Baseline
# on migrate initializes the schema history table instead of failing.
quarkus.flyway.baseline-on-migrate=true

# Datasource pointing at the local PostgreSQL started by process-compose.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=quarkus
quarkus.datasource.password=quarkus
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/insurancehub

# carQuote and carEstimatedValue model runtime URLs on the local Decision
# Control instance (the unit is named after the uploaded zip, e.g.
# carQuote.dmn, and the model id is the model name). IH_*_URL exports from
# models-upload.sh still win over these defaults.
ih.quote.vehicle-price.url=${IH_CAR_QUOTE_URL:http://localhost:8081/api/runtime/aletyx/carQuote.dmn/latest/carQuote}
ih.quote.vehicle-value.url=${IH_CAR_ESTIMATED_VALUE_URL:http://localhost:8081/api/runtime/aletyx/carEstimatedValue.dmn/latest/carEstimatedValue}

