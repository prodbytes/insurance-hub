# Running behind the GitHub Codespaces port-forwarding proxy: honor the
# X-Forwarded-* headers so Quarkus builds absolute redirects (e.g. the
# /app -> /app/ trailing-slash redirect) from the public host/scheme instead
# of localhost:8080, which the proxy can't reach.
quarkus.http.proxy.proxy-address-forwarding=true
quarkus.http.proxy.enable-forwarded-host=true
quarkus.http.proxy.enable-forwarded-prefix=true

# Dev profile: run Flyway migrations automatically on startup.
quarkus.flyway.migrate-at-start=true
# Decision Control shares this database and creates its own tables in `public`
# (Hibernate ddl-auto), so the schema is non-empty before Flyway runs. Baseline
# on migrate initializes the schema history table instead of failing.
quarkus.flyway.baseline-on-migrate=true

# Datasource pointing at the local PostgreSQL started by process-compose.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=quarkus
quarkus.datasource.password=quarkus
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/insurancehub
