quarkus.http.host=0.0.0.0
quarkus.http.port=8080

# Running behind a trusted reverse proxy (GitHub Codespaces port forwarding in
# dev, and the production proxy): honor the X-Forwarded-* headers so Quarkus
# builds absolute redirects (e.g. the /app -> /app/ trailing-slash redirect)
# from the public host/scheme instead of localhost:8080, which the proxy can't
# reach.
quarkus.http.proxy.proxy-address-forwarding=true
quarkus.http.proxy.enable-forwarded-host=true
quarkus.http.proxy.enable-forwarded-prefix=true

quarkus.rest.path=/rs

# Jandex-index the Leaflet map add-on jar so Vaadin's dependency scanner sees
# its @NpmPackage/@JsModule annotations (third-party jars aren't indexed by
# Quarkus by default, and without this the leaflet frontend bundle is never built).
quarkus.index-dependency.xdev-maps-leaflet.group-id=software.xdev.vaadin.maps-leaflet
quarkus.index-dependency.xdev-maps-leaflet.artifact-id=flow

# Aletyx Decision Control runtime endpoint for the car-quote DMN model, which
# computes the risk rate and premium from the estimated vehicle value and the
# risk inputs. The value (incl. the generated model id) is exported at startup
# by scripts/models-upload.sh as IH_CAR_QUOTE_URL (derived from the model file
# name, IH_<UPPER_SNAKE>_URL), so it isn't hard-coded here; empty default keeps
# the app bootable if the upload didn't run.
ih.quote.vehicle-price.url=${IH_CAR_QUOTE_URL:}

# Runtime endpoint for the standalone carEstimatedValue DMN model, invoked
# first to estimate the vehicle value that carQuote then takes as an input.
ih.quote.vehicle-value.url=${IH_CAR_ESTIMATED_VALUE_URL:}

# Aletyx Decision Control runtime endpoint that starts a car-contract process
# instance (KIE Server shaped: .../processes/<processId>/instances). Exported at
# startup by scripts/models-upload.sh as IH_CONTRACT_PROCESS_URL; empty default
# keeps the app bootable if the upload didn't run.
ih.contract.process-start.url=${IH_CONTRACT_PROCESS_URL:}

# Flyway: disabled by default; enabled per-profile (see application-dev.properties).
quarkus.flyway.migrate-at-start=false

# Tests: Dev Services provide a throwaway PostgreSQL (no datasource URL is set
# for the test profile), so migrate the fresh schema at start. Kafka Dev
# Services are not needed (no messaging channels are defined).
%test.quarkus.flyway.migrate-at-start=true
%test.quarkus.kafka.devservices.enabled=false
# Random test port so the suite can run while the dev stack occupies 8081.
%test.quarkus.http.test-port=0
# CarQuoteDmnTest evaluates the carEstimatedValue and carQuote models through
# the same Decision Control runtime endpoints the app calls; default to the
# local instance since models-upload.sh exports are not sourced into test runs.
%test.ih.quote.vehicle-price.url=${IH_CAR_QUOTE_URL:http://localhost:8081/api/runtime/aletyx/carQuote.dmn/latest/carQuote}
%test.ih.quote.vehicle-value.url=${IH_CAR_ESTIMATED_VALUE_URL:http://localhost:8081/api/runtime/aletyx/carEstimatedValue.dmn/latest/carEstimatedValue}
# No test starts the contract process; the placeholder just lets the app boot
# (the empty default fails @ConfigProperty String injection).
%test.ih.contract.process-start.url=http://localhost:0/unused-in-tests

# Packaging
quarkus.swagger-ui.always-include=true

org.kie.dmn.runtime.typecheck=true
quarkus.native.additional-build-args=--initialize-at-run-time=org.apache.hc.client5.http.impl.auth.NTLMEngineImpl
