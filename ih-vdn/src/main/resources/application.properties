quarkus.http.host=0.0.0.0
quarkus.http.port=8080

# Running behind a trusted reverse proxy (GitHub Codespaces port forwarding in
# dev, and the production proxy): honor the X-Forwarded-* headers so Quarkus
# builds absolute redirects (e.g. the /app -> /app/ trailing-slash redirect)
# from the public host/scheme instead of localhost:8080, which the proxy can't
# reach.
quarkus.http.proxy.proxy-address-forwarding=true
quarkus.http.proxy.enable-forwarded-host=true
quarkus.http.proxy.enable-forwarded-prefix=true

quarkus.rest.path=/rs

# Aletyx Decision Control runtime endpoint for the car-quote DMN model, used to
# estimate the vehicle value. The value (incl. the generated model id) is exported
# at startup by scripts/models-upload.sh as IH_QUOTE_VEHICLE_PRICE_URL, so it isn't
# hard-coded here; empty default keeps the app bootable if the upload didn't run.
ih.quote.vehicle-price.url=${IH_QUOTE_VEHICLE_PRICE_URL:}

# Aletyx Decision Control runtime endpoint that starts a car-contract process
# instance (KIE Server shaped: .../processes/<processId>/instances). Exported at
# startup by scripts/models-upload.sh as IH_CONTRACT_PROCESS_URL; empty default
# keeps the app bootable if the upload didn't run.
ih.contract.process-start.url=${IH_CONTRACT_PROCESS_URL:}

# Flyway: disabled by default; enabled per-profile (see application-dev.properties).
quarkus.flyway.migrate-at-start=false

# Packaging
quarkus.swagger-ui.always-include=true

org.kie.dmn.runtime.typecheck=true
quarkus.native.additional-build-args=--initialize-at-run-time=org.apache.hc.client5.http.impl.auth.NTLMEngineImpl
