processes:
  # Periodic health check: docker registry auth, database, and ih-vdn readiness.
  0-health:
    command: ./scripts/health.sh
    working_dir: .

  # PostgreSQL database, run as a throwaway container for local dev.
  # ih-data/ is mounted as /docker-entrypoint-initdb.d: with no volume, initdb
  # runs on every startup and replays ih-data/*.sql, seeding the database from
  # the last ./scripts/db-dump.sh snapshot. Runs from the repo root, so $(pwd)
  # resolves to it (docker -v needs an absolute path).
  1-database:
    command: >-
      docker run --rm --name insurance-hub-db
      -e POSTGRES_USER=${QUARKUS_DATASOURCE_USERNAME:-quarkus}
      -e POSTGRES_PASSWORD=${QUARKUS_DATASOURCE_PASSWORD:-quarkus}
      -e POSTGRES_DB=${POSTGRES_DB:-insurancehub}
      -v "$(pwd)/ih-data:/docker-entrypoint-initdb.d:ro"
      -p 5432:5432
      postgres:16-alpine
    shutdown:
      command: docker stop insurance-hub-db
      timeout_seconds: 30
    readiness_probe:
      exec:
        command: docker exec insurance-hub-db pg_isready -U ${QUARKUS_DATASOURCE_USERNAME:-quarkus} -d ${POSTGRES_DB:-insurancehub}
      initial_delay_seconds: 3
      period_seconds: 3
      timeout_seconds: 5
      failure_threshold: 20
    availability:
      restart: on_failure
      backoff_seconds: 5

  # Aletyx Decision Control, run as a throwaway container against the local PostgreSQL.
  # Host port 8081 -> container 8080 to avoid colliding with ih-vdn on 8080.
  # --add-host lets the container reach the host's :5432 (the database process) on Linux/WSL2.
  # Shares the Quarkus database via POSTGRES_* (host.docker.internal not localhost since it
  # runs in a container). DC builds its datasource AND detects the DB type from these vars, so
  # the startup banner reports PostgreSQL correctly; configuring via SPRING_DATASOURCE_URL
  # instead connects fine but makes DC's detector fall back to reporting "H2 (in-memory)".
  # Hibernate ddl-auto=update creates its own tables there.
  # APP_HOST is the public URL the browser uses to reach DC; the SPA reads it from env.json and
  # uses it as the base for all its API calls (/ping, /api/authz/*, ...). The image defaults it
  # to http://localhost:8080, which here is the ih-vdn app, so those calls 404 and the action
  # cards render disabled. Must match the host-side port (8081).
  2-decision-control:
    command: >-
      docker run --rm --name decision-control
      --add-host=host.docker.internal:host-gateway
      -p 8081:8080
      -e SPRING_PROFILES_ACTIVE=postgres
      -e POSTGRES_HOST=host.docker.internal
      -e POSTGRES_PORT=5432
      -e POSTGRES_DB=${POSTGRES_DB:-insurancehub}
      -e POSTGRES_USER=${DC_DATASOURCE_USERNAME:-quarkus}
      -e POSTGRES_PASSWORD=${DC_DATASOURCE_PASSWORD:-quarkus}
      -e HIBERNATE_DDL_AUTO=update
      -e ALETYX_OIDC_PROVIDER=none
      -e APP_HOST=${APP_HOST:-http://localhost:8081}
      ${DECISION_CONTROL_IMAGE}
    shutdown:
      command: docker stop decision-control
      timeout_seconds: 30
    depends_on:
      1-database:
        condition: process_healthy
    readiness_probe:
      http_get:
        host: 127.0.0.1
        port: 8081
        path: /
        scheme: http
      initial_delay_seconds: 5
      period_seconds: 15
      timeout_seconds: 5
      failure_threshold: 120   

  # ih-vdn Quarkus app in dev mode; starts once Decision Control is healthy so its
  # dev-start script can upload the decision models before the app comes up
  # (decision-control itself waits for the database).
  3-ih-vdn:
    command: ./ih-vdn/scripts/dev-start.sh
    working_dir: .
    depends_on:
      2-decision-control:
        condition: process_healthy
    readiness_probe:
      http_get:
        host: 127.0.0.1
        port: 8080
        path: /q/health/ready
        scheme: http
      initial_delay_seconds: 5
      period_seconds: 15
      timeout_seconds: 5
      failure_threshold: 120

